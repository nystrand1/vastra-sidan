query GetAwayGames {
  awayGames: awaygames(where: { stati: [PUBLISH, PRIVATE, DRAFT] }) {
    nodes {
      id: databaseId
      status
      awayGameFields {
        date
        busInfo: businfo
        enemyTeam: enemyteam
        memberPrice: memberprice
        memberPriceYouth: memberpriceYouth
        nonMemberPrice: nonmemberprice
        nonMemberPriceYouth: nonmemberpriceYouth
        buses {
          id
          busName
          maxSeats
          requiredSeats
          occupiedSeats
        }
      }
    }
  }
}
